<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFP Action Queue</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    line-height: 1.5;
    padding: 24px 32px;
  }

  h1 { font-size: 1.5rem; font-weight: 700; color: #f0f6fc; margin-bottom: 4px; }
  .subtitle { font-size: 0.85rem; color: #8b949e; margin-bottom: 20px; }

  /* Filters */
  .filters {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 20px; padding-bottom: 16px;
    border-bottom: 1px solid #21262d;
  }
  .filter-btn {
    background: #161b22; border: 1px solid #30363d; color: #8b949e;
    padding: 5px 12px; border-radius: 6px; cursor: pointer;
    font-size: 0.8rem; font-family: inherit; transition: all 0.15s;
  }
  .filter-btn:hover { border-color: #8b949e; color: #c9d1d9; }
  .filter-btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  .filter-btn.status-open.active { background: #da3633; border-color: #da3633; }
  .filter-btn.status-done.active { background: #238636; border-color: #238636; }
  .filter-btn.status-noise.active { background: #484f58; border-color: #484f58; }
  .filter-btn.status-waiting.active { background: #9e6a03; border-color: #9e6a03; }
  .filter-group { display: flex; gap: 6px; align-items: center; }
  .filter-label { font-size: 0.75rem; color: #484f58; text-transform: uppercase; letter-spacing: 0.5px; margin-right: 4px; }
  .filter-sep { width: 1px; height: 24px; background: #21262d; margin: 0 8px; }

  /* Stats bar */
  .stats {
    display: flex; gap: 16px; margin-bottom: 20px;
  }
  .stat {
    background: #161b22; border: 1px solid #21262d; border-radius: 8px;
    padding: 8px 16px; min-width: 80px; text-align: center;
  }
  .stat-value { font-size: 1.4rem; font-weight: 700; }
  .stat-label { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-open .stat-value { color: #da3633; }
  .stat-waiting .stat-value { color: #d29922; }
  .stat-done .stat-value { color: #238636; }
  .stat-noise .stat-value { color: #484f58; }
  .stat-total .stat-value { color: #58a6ff; }

  /* Items */
  .item {
    background: #161b22; border: 1px solid #21262d; border-radius: 8px;
    padding: 12px 16px; margin-bottom: 8px;
    display: flex; gap: 12px; align-items: flex-start;
    transition: all 0.2s; cursor: default;
  }
  .item:hover { border-color: #30363d; }
  .item.resolved { opacity: 0.4; }
  .item.noise { opacity: 0.25; }

  .item-status {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 0.8rem; font-weight: 700;
    border: 2px solid; transition: all 0.15s;
    user-select: none;
  }
  .item-status:hover { transform: scale(1.1); }
  .status-open { border-color: #da3633; color: #da3633; background: rgba(218,54,51,0.1); }
  .status-done { border-color: #238636; color: #238636; background: rgba(35,134,54,0.1); }
  .status-noise { border-color: #484f58; color: #484f58; background: rgba(72,79,88,0.1); }
  .status-waiting { border-color: #d29922; color: #d29922; background: rgba(210,153,34,0.1); }

  .item-body { flex: 1; min-width: 0; }
  .item-header { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; }
  .item-from { font-weight: 600; color: #f0f6fc; font-size: 0.9rem; }
  .item-date { font-size: 0.75rem; color: #484f58; }
  .item-deadline { font-size: 0.75rem; color: #da3633; font-weight: 600; }
  .item-category {
    font-size: 0.7rem; padding: 1px 6px; border-radius: 10px;
    background: #21262d; color: #8b949e;
  }
  .item-ask { font-size: 0.85rem; color: #c9d1d9; margin-top: 4px; }
  .item-detail {
    font-size: 0.8rem; color: #8b949e; margin-top: 4px;
    display: none; /* toggle on click */
  }
  .item-detail.show { display: block; }
  .item-subject { font-size: 0.75rem; color: #58a6ff; margin-top: 2px; cursor: pointer; }
  .item-subject:hover { text-decoration: underline; }

  /* Keyboard hint */
  .keyboard-hint {
    position: fixed; bottom: 16px; right: 16px;
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    padding: 8px 12px; font-size: 0.7rem; color: #484f58;
  }
  .keyboard-hint kbd {
    background: #21262d; border: 1px solid #30363d; border-radius: 3px;
    padding: 1px 4px; font-family: inherit;
  }

  /* Save indicator */
  .save-indicator {
    position: fixed; top: 16px; right: 16px;
    background: #238636; color: #fff; padding: 6px 12px;
    border-radius: 6px; font-size: 0.8rem; font-weight: 600;
    opacity: 0; transition: opacity 0.3s;
  }
  .save-indicator.show { opacity: 1; }

  /* Search */
  .search {
    background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    padding: 6px 12px; color: #c9d1d9; font-size: 0.85rem;
    font-family: inherit; width: 240px; outline: none;
  }
  .search:focus { border-color: #58a6ff; }
  .search::placeholder { color: #484f58; }
</style>
</head>
<body>

<h1>NFP Action Queue</h1>
<div class="subtitle">
  <span id="countLabel">Loading...</span> &middot;
  Click status icon to cycle: Open > Waiting > Done > Noise &middot;
  Click subject to expand detail
</div>

<div class="stats" id="stats"></div>

<div class="filters">
  <div class="filter-group">
    <span class="filter-label">Show</span>
    <button class="filter-btn status-open active" data-filter="open" onclick="toggleFilter('open')">Open</button>
    <button class="filter-btn status-waiting active" data-filter="waiting" onclick="toggleFilter('waiting')">Waiting on NFP</button>
    <button class="filter-btn status-done" data-filter="done" onclick="toggleFilter('done')">Done</button>
    <button class="filter-btn status-noise" data-filter="noise" onclick="toggleFilter('noise')">Noise</button>
  </div>
  <div class="filter-sep"></div>
  <div class="filter-group">
    <span class="filter-label">Category</span>
    <select id="categoryFilter" class="search" style="width:160px" onchange="renderItems()">
      <option value="">All</option>
    </select>
  </div>
  <div class="filter-sep"></div>
  <input type="text" class="search" id="searchBox" placeholder="Search name, subject, ask..." oninput="renderItems()">
</div>

<div id="itemList"></div>

<div class="save-indicator" id="saveIndicator">Saved</div>
<div class="keyboard-hint">
  <kbd>d</kbd> done &middot; <kbd>n</kbd> noise &middot; <kbd>w</kbd> waiting &middot; <kbd>o</kbd> open &middot; <kbd>s</kbd> save
</div>

<script>
const STATUS_CYCLE = ['open', 'waiting', 'done', 'noise'];
const STATUS_LABELS = { open: 'O', waiting: 'W', done: 'D', noise: '—' };

let items = [];
let activeFilters = { open: true, waiting: true, done: false, noise: false };
let selectedIdx = -1;

// Load data
async function loadData() {
  // Try localStorage first (user overrides), then fetch fresh
  const saved = localStorage.getItem('nfp-queue-state');
  const resp = await fetch('data/emails.json');
  const raw = await resp.json();

  // Merge: raw data + saved status overrides
  const overrides = saved ? JSON.parse(saved) : {};

  items = raw.map(r => {
    const id = r.message_id;
    // Map original fulfilled to our status
    let status = 'open';
    if (overrides[id]) {
      status = overrides[id];
    } else if (r.fulfilled === 'yes') {
      status = 'done';
    } else if (r.fulfilled === 'partial') {
      status = 'waiting';
    }
    return { ...r, status, id };
  });

  // Populate category filter
  const cats = [...new Set(items.map(i => i.category))].sort();
  const sel = document.getElementById('categoryFilter');
  cats.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    sel.appendChild(opt);
  });

  renderItems();
}

function toggleFilter(status) {
  activeFilters[status] = !activeFilters[status];
  document.querySelector(`[data-filter="${status}"]`).classList.toggle('active');
  renderItems();
}

function cycleStatus(idx) {
  const item = items[idx];
  const cur = STATUS_CYCLE.indexOf(item.status);
  item.status = STATUS_CYCLE[(cur + 1) % STATUS_CYCLE.length];
  saveState();
  renderItems();
}

function saveState() {
  const state = {};
  items.forEach(i => { if (i.status !== 'open') state[i.id] = i.status; });
  localStorage.setItem('nfp-queue-state', JSON.stringify(state));
  // Flash save indicator
  const el = document.getElementById('saveIndicator');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1000);
}

function toggleDetail(msgId) {
  const el = document.getElementById('detail-' + msgId);
  if (el) el.classList.toggle('show');
}

function renderItems() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  const catFilter = document.getElementById('categoryFilter').value;

  const filtered = items.filter(i => {
    if (!activeFilters[i.status]) return false;
    if (catFilter && i.category !== catFilter) return false;
    if (search) {
      const hay = `${i.from_name} ${i.subject} ${i.ask} ${i.detail} ${i.from_role}`.toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  // Stats
  const counts = { open: 0, waiting: 0, done: 0, noise: 0 };
  items.forEach(i => counts[i.status]++);
  document.getElementById('stats').innerHTML = `
    <div class="stat stat-open"><div class="stat-value">${counts.open}</div><div class="stat-label">Open</div></div>
    <div class="stat stat-waiting"><div class="stat-value">${counts.waiting}</div><div class="stat-label">Waiting</div></div>
    <div class="stat stat-done"><div class="stat-value">${counts.done}</div><div class="stat-label">Done</div></div>
    <div class="stat stat-noise"><div class="stat-value">${counts.noise}</div><div class="stat-label">Noise</div></div>
    <div class="stat stat-total"><div class="stat-value">${items.length}</div><div class="stat-label">Total</div></div>
  `;

  document.getElementById('countLabel').textContent =
    `Showing ${filtered.length} of ${items.length} emails`;

  const html = filtered.map((item, i) => {
    const deadline = item.deadline
      ? `<span class="item-deadline">DUE: ${item.deadline}</span>` : '';

    return `
      <div class="item ${item.status === 'done' ? 'resolved' : ''} ${item.status === 'noise' ? 'noise' : ''}"
           data-idx="${items.indexOf(item)}">
        <div class="item-status status-${item.status}"
             onclick="cycleStatus(${items.indexOf(item)})"
             title="Click to cycle status">${STATUS_LABELS[item.status]}</div>
        <div class="item-body">
          <div class="item-header">
            <span class="item-from">${item.from_name}</span>
            <span class="item-category">${item.category}</span>
            <span class="item-date">${item.date}</span>
            ${deadline}
          </div>
          <div class="item-ask">${escHtml(item.ask)}</div>
          <div class="item-subject" onclick="toggleDetail('${item.id}')">${escHtml(item.subject)}</div>
          <div class="item-detail" id="detail-${item.id}">${escHtml(item.detail)}</div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('itemList').innerHTML = html;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 's') { saveState(); return; }
});

loadData();
</script>
</body>
</html>
